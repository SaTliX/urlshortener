groups:
  - name: urlshortener
    rules:
      - alert: HighLatency
        expr: |
          histogram_quantile(0.99,
            rate(urlshortener_shorten_duration_seconds_bucket[5m])
          ) > 0.1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Latence p99 élevée sur /shorten"

      - alert: HighErrorRate
        expr: |
          rate(http_requests_total{status=~"5.."}[5m])
          / rate(http_requests_total[5m]) * 100 > 5
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Taux d'erreurs 5xx > 5%"
