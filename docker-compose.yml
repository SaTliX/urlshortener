version: '3.9'

services:
  urlshortener:
    image: urlshortener:latest
    container_name: urlshortener-staging
    ports:
      - "8001:8000"
    environment:
      - ENV=staging
      - LOG_LEVEL=INFO
    networks:
      - cicd-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  cicd-network:
    external: true
